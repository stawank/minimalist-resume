<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stawan Kulkarni - Automotive Software Engineer</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="favicon.ico" sizes="32x32" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S8FDWEFYGB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S8FDWEFYGB');
    </script>
  </head>
  <body>

    <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <span class="icon">☀️</span>
    </div>
    <div class="language-toggle">
      <button type="button" data-lang-btn="en" onclick="setLanguage('en')">EN</button>
      <span>|</span>
      <button type="button" data-lang-btn="de" onclick="setLanguage('de')">DE</button>
    </div>

    <!-- BOOT SEQUENCE OVERLAY -->
    <div class="boot-overlay" id="boot-overlay">
      <div class="boot-lines" id="boot-lines"></div>
      <div class="boot-prompt" id="boot-prompt"></div>
      <div class="boot-skip" id="boot-skip">press any key to skip ↵</div>
    </div>

    <!-- MAIN CONTENT — rendered by JS from JSON -->
    <div class="container" id="main-container" style="visibility:hidden"></div>

    <!-- CHATBOT -->
    <div class="chatbot-tooltip" id="chatbot-tooltip">ask me anything →</div>
    <button class="chatbot-toggle" id="chatbot-toggle" onclick="toggleChat()" style="visibility:hidden"></button>
    <div class="chatbot" id="chatbot-panel">
      <div class="chatbot-header">
        <span id="chatbot-title"></span>
        <button class="chatbot-close" onclick="toggleChat()" title="Close">✕</button>
      </div>
      <div class="chatbot-messages" id="chat-messages"></div>
      <form id="chat-form">
        <input type="text" id="chat-input" autocomplete="off" required />
        <button type="submit" id="chat-submit">Send</button>
      </form>
      <div class="chatbot-footer" id="chatbot-footer"></div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────
      let currentLang = 'en'
      const cache = {}

      // ── Theme ──────────────────────────────────────────────────────────────
      function toggleTheme() {
        const html = document.documentElement
        const icon = document.querySelector(".theme-toggle .icon")
        const isDark = html.getAttribute("data-theme") === "dark"
        if (isDark) {
          html.removeAttribute("data-theme")
          icon.textContent = "🌙"
          localStorage.setItem("theme", "light")
        } else {
          html.setAttribute("data-theme", "dark")
          icon.textContent = "☀️"
          localStorage.setItem("theme", "dark")
        }
      }

      function loadTheme() {
        const saved = localStorage.getItem("theme")
        const icon  = document.querySelector(".theme-toggle .icon")
        if (saved === "light") {
          document.documentElement.removeAttribute("data-theme")
          icon.textContent = "🌙"
        } else {
          document.documentElement.setAttribute("data-theme", "dark")
          icon.textContent = "☀️"
        }
      }

      // ── JSON loader ────────────────────────────────────────────────────────
      async function loadData(lang) {
        if (cache[lang]) return cache[lang]
        try {
          const res = await fetch(`${lang}.json`)
          if (!res.ok) throw new Error(`HTTP ${res.status}`)
          const data = await res.json()
          cache[lang] = data
          return data
        } catch (err) {
          console.error(`Failed to load ${lang}.json:`, err)
          document.getElementById("main-container").innerHTML = `
            <div style="padding:2rem;font-family:monospace;color:#68d83e;">
              <p style="color:#d4a017;">[ ERROR ] failed to load ${lang}.json</p>
              <p style="opacity:0.6;margin-top:0.5rem;">${err.message}</p>
              <p style="opacity:0.5;margin-top:1rem;font-size:0.8rem;">
                Make sure en.json and de.json are in the same folder as index.html<br>
                and served via a web server (not opened as file://)
              </p>
            </div>`
          document.getElementById("main-container").style.visibility = ""
          document.getElementById("boot-overlay").style.display = "none"
          return null
        }
      }

      // ── Renderers ──────────────────────────────────────────────────────────
      function renderHeader(d) {
        const h = d.header
        return `
        <header class="header fade-in">
          <div class="uptime-line" id="uptime-line">${h.uptime} <span id="uptime-out"></span></div>
          <div class="avatar">
            <img src="photo.jpg" alt="${h.name}" />
          </div>
          <h1 class="name">${h.name}</h1>
          <p class="title">${h.title}</p>
          <p class="location">${h.location}</p>
          <div class="contact-links">
            <div class="contact-row contact-row--primary">
              <a href="mailto:${h.contact.email}" class="contact-link">mail: ${h.contact.email}</a>
              <a href="${h.contact.linkedin_url}" target="_blank" class="contact-link">${h.contact.linkedin_label}</a>
              <a href="${h.contact.github_url}" target="_blank" class="contact-link">${h.contact.github_label}</a>
            </div>
            <div class="contact-row contact-row--secondary">
              <a href="tel:${h.contact.phone_de.replace(/\s/g,'')}" class="contact-link">tel: ${h.contact.phone_de}</a>
              <a href="tel:${h.contact.phone_in.replace(/\s/g,'')}" class="contact-link">tel: ${h.contact.phone_in}</a>
            </div>
          </div>
        </header>`
      }

      function renderAbout(d) {
        const a = d.about
        return `
        <section class="section fade-in stagger-1">
          <h2 class="section-title">[ ${d.sections.about} ]</h2>
          <div class="card">
            <div class="about-lines">
              <div class="about-line"><span class="about-key">role</span><span class="about-val">${a.role}</span></div>
              <div class="about-line"><span class="about-key">stack</span><span class="about-val">${a.stack}</span></div>
              <div class="about-line"><span class="about-key">exp</span><span class="about-val">${a.exp}</span></div>
              <div class="about-line"><span class="about-key">currently</span><span class="about-val">${a.current}</span></div>
            </div>
          </div>
        </section>`
      }

      function renderExperience(d) {
        const cards = d.experience.map(job => `
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">${job.title}</h3>
              <p class="card-subtitle">${job.company}</p>
            </div>
            <p class="card-meta">${job.period}</p>
            <ul class="card-bullets">
              ${job.bullets.map(b => `<li>${b}</li>`).join('\n')}
            </ul>
          </div>`).join('\n')
        return `
        <section class="section fade-in stagger-2">
          <h2 class="section-title">[ ${d.sections.experience} ]</h2>
          ${cards}
        </section>`
      }

      function renderProjects(d) {
        const cards = d.projects.map(p => {
          const links = p.links.map(l =>
            `<a href="${l.url}" class="project-link"${l.url.startsWith('http') ? ' target="_blank"' : ''}>${l.label}</a>`
          ).join('\n')
          return `
          <div class="card">
            <h3 class="card-title">${p.title}</h3>
            <p class="card-meta">${p.stack}</p>
            <p class="card-description">${p.description}</p>
            <div class="project-links">${links}</div>
          </div>`
        }).join('\n')
        return `
        <section class="section fade-in stagger-3">
          <h2 class="section-title">[ ${d.sections.projects} ]</h2>
          ${cards}
        </section>`
      }

      function renderSkills(d) {
        const groups = d.skills.map(g => `
          <div class="skill-group">
            <div class="skill-group-label">${g.group}</div>
            <div class="skills-grid">
              ${g.items.map(i => `<div class="skill-item">${i}</div>`).join('\n')}
            </div>
          </div>`).join('\n')
        return `
        <section class="section fade-in stagger-4">
          <h2 class="section-title">[ ${d.sections.skills} ]</h2>
          <div class="skills-groups">${groups}</div>
        </section>`
      }

      function renderEducation(d) {
        const cards = d.education.map(e => {
          const links = e.links.length
            ? `<div class="project-links">${e.links.map(l => `<a href="${l.url}" class="project-link">${l.label}</a>`).join('')}</div>`
            : ''
          return `
          <div class="card">
            <h3 class="card-title">${e.degree}</h3>
            <p class="card-subtitle">${e.school}</p>
            <p class="card-meta">${e.period}</p>
            <p class="card-description">${e.description}</p>
            ${links}
          </div>`
        }).join('\n')
        return `
        <section class="section fade-in stagger-5">
          <h2 class="section-title">[ ${d.sections.education} ]</h2>
          ${cards}
        </section>`
      }

      function renderEof() {
        return `
        <div class="eof-line fade-in stagger-5">
          <span>-- end of file --</span>
          <span class="eof-exit">[exit 0]</span>
        </div>`
      }

      function renderChatbot(d) {
        const cb = d.chatbot
        const toggle = document.getElementById("chatbot-toggle")
        toggle.innerHTML = `<span class="chatbot-toggle-label">${cb.toggle_label}</span>`
        document.getElementById("chatbot-title").textContent  = cb.header
        document.getElementById("chat-input").placeholder     = cb.placeholder
        document.getElementById("chatbot-footer").textContent = cb.footer

        // Pulse on button for first-time visitors
        if (!localStorage.getItem("chatbot-seen")) {
          toggle.classList.add("chatbot-toggle-pulse")
        }
      }

      // ── Full render ────────────────────────────────────────────────────────
      function render(data) {
        document.getElementById("main-container").innerHTML = `
          ${renderHeader(data)}
          ${renderAbout(data)}
          ${renderExperience(data)}
          ${renderProjects(data)}
          ${renderSkills(data)}
          ${renderEducation(data)}
          ${renderEof()}
        `
        renderChatbot(data)
        updateLangButtons()
        startUptimeClock()
      }

      function startUptimeClock() {
        const el = document.getElementById("uptime-out")
        if (!el) return
        const start = Date.now()
        const fmt = (n) => String(n).padStart(2, "0")
        const tick = () => {
          const s = Math.floor((Date.now() - start) / 1000)
          const h = Math.floor(s / 3600)
          const m = Math.floor((s % 3600) / 60)
          const sec = s % 60
          const now = new Date()
          el.textContent = `${now.toLocaleTimeString()} up ${fmt(h)}:${fmt(m)}:${fmt(sec)}, load avg: 0.42`
        }
        tick()
        setInterval(tick, 1000)
      }

      // ── Language ───────────────────────────────────────────────────────────
      async function setLanguage(lang) {
        currentLang = lang
        localStorage.setItem("lang", lang)
        document.documentElement.setAttribute("lang", lang)
        const data = await loadData(lang)
        render(data)
      }

      function updateLangButtons() {
        document.querySelectorAll("[data-lang-btn]").forEach(btn => {
          btn.classList.toggle("active", btn.getAttribute("data-lang-btn") === currentLang)
        })
      }

      // ── Chatbot tooltip ────────────────────────────────────────────────────
      function showChatbotTooltip() {
        if (localStorage.getItem("chatbot-seen")) return
        const tip    = document.getElementById("chatbot-tooltip")
        const toggle = document.getElementById("chatbot-toggle")
        if (!tip || !toggle) return
        // Position is pure CSS (absolute relative to toggle), just show it
        tip.classList.add("chatbot-tooltip--visible")
        const hide = () => {
          tip.classList.remove("chatbot-tooltip--visible")
          tip.classList.add("chatbot-tooltip--gone")
        }
        const timer = setTimeout(hide, 4000)
        // Dismiss early if user clicks toggle
        toggle.addEventListener("click", () => { clearTimeout(timer); hide() }, { once: true })
      }

      // ── Welcome message + shortcuts ────────────────────────────────────────
      const SHORTCUTS = {
        "1": "What's your strongest skill?",
        "2": "Tell me about your experience",
        "3": "Are you open to work?"
      }

      function showWelcomeMessage() {
        const container = document.getElementById("chat-messages")
        if (container.querySelector(".chat-message")) return  // already shown
        const msg = document.createElement("div")
        msg.className = "chat-message chat-message-assistant"
        msg.innerHTML =
          `initialized. i know everything about stawan.<br><br>` +
          `<span class="chat-hint">[1]</span> strongest skill?<br>` +
          `<span class="chat-hint">[2]</span> AUTOSAR experience<br>` +
          `<span class="chat-hint">[3]</span> open to work?<br><br>` +
          `<span class="chat-dim">— or just type anything</span>`
        container.appendChild(msg)
      }

      // ── Chatbot toggle ─────────────────────────────────────────────────────
      let chatOpen = false

      function toggleChat() {
        chatOpen = !chatOpen
        const panel  = document.getElementById("chatbot-panel")
        const toggle = document.getElementById("chatbot-toggle")
        panel.classList.toggle("chatbot-open", chatOpen)
        toggle.classList.toggle("chatbot-toggle-active", chatOpen)
        if (chatOpen) {
          toggle.classList.add("chatbot-toggle-seen")
          toggle.classList.remove("chatbot-toggle-pulse")
          localStorage.setItem("chatbot-seen", "1")
          showWelcomeMessage()
          document.getElementById("chat-input").focus()
        }
      }

      // ── Minimal markdown renderer (bold, italic, inline code, newlines) ──────
      function renderMarkdown(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g,     "<em>$1</em>")
          .replace(/`(.+?)`/g,       "<code>$1</code>")
          .replace(/\n/g,            "<br>")
      }

      // ── Chat streaming ─────────────────────────────────────────────────────
      async function sendStreamingMessage(question) {
        const container = document.getElementById("chat-messages")
        const submitBtn = document.getElementById("chat-submit")

        const userDiv = document.createElement("div")
        userDiv.className = "chat-message chat-message-user"
        userDiv.textContent = question
        container.appendChild(userDiv)

        submitBtn.disabled = true
        submitBtn.textContent = "..."

        const botDiv = document.createElement("div")
        botDiv.className = "chat-message chat-message-assistant"
        botDiv.textContent = "▍"
        container.appendChild(botDiv)
        container.scrollTop = container.scrollHeight

        try {
          const res = await fetch("/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          })
          if (!res.ok) throw new Error("Server error")

          const reader  = res.body.getReader()
          const decoder = new TextDecoder()
          let fullText  = ""

          while (true) {
            const { done, value } = await reader.read()
            if (done) break
            const lines = decoder.decode(value).split("\n")
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue
              const data = line.slice(6).trim()
              if (data === "[DONE]") break
              try {
                const parsed = JSON.parse(data)
                fullText += parsed.token
                botDiv.innerHTML = renderMarkdown(fullText) + "<span class='boot-cursor'>▍</span>"
                container.scrollTop = container.scrollHeight
              } catch {}
            }
          }
          botDiv.innerHTML = fullText
            ? renderMarkdown(fullText)
            : "I don't have that information."
        } catch (err) {
          botDiv.textContent = "Could not reach the chatbot backend."
          console.error(err)
        }

        submitBtn.disabled = false
        submitBtn.textContent = "Send"
        container.scrollTop = container.scrollHeight
      }

      // ── Boot sequence ──────────────────────────────────────────────────────
      function runBootSequence(bootData) {
        // Returning visitors skip entirely
        if (sessionStorage.getItem("booted")) {
          document.getElementById("boot-overlay").style.display = "none"
          document.getElementById("main-container").style.visibility = ""
          const toggle = document.getElementById("chatbot-toggle")
          toggle.style.visibility = ""
          showChatbotTooltip()
          return
        }

        const overlay  = document.getElementById("boot-overlay")
        const linesEl  = document.getElementById("boot-lines")
        const promptEl = document.getElementById("boot-prompt")
        const skipHint = document.getElementById("boot-skip")
        let skipped    = false

        // Clamp total line animation to 1.6 s max, min 40 ms/line
        const lineCount   = bootData.lines.length
        const lineInterval = Math.max(40, Math.min(80, Math.floor(1600 / lineCount)))

        function finishBoot() {
          if (skipped) return
          skipped = true
          removeSkipListeners()
          overlay.classList.add("boot-overlay--done")
          setTimeout(() => {
            overlay.style.display = "none"
            document.getElementById("main-container").style.visibility = ""
            document.getElementById("chatbot-toggle").style.visibility = ""
            sessionStorage.setItem("booted", "1")
            showChatbotTooltip()
          }, 350)
        }

        function skipBoot() {
          if (skipped) return
          skipped = true
          removeSkipListeners()
          overlay.style.transition = "opacity 0.15s"
          overlay.style.opacity = "0"
          setTimeout(() => {
            overlay.style.display = "none"
            document.getElementById("main-container").style.visibility = ""
            document.getElementById("chatbot-toggle").style.visibility = ""
            sessionStorage.setItem("booted", "1")
            showChatbotTooltip()
          }, 150)
        }

        function onKey()   { skipBoot() }
        function onTouch() { skipBoot() }

        function removeSkipListeners() {
          document.removeEventListener("keydown",     onKey)
          document.removeEventListener("touchstart",  onTouch)
          overlay.removeEventListener("click",        onTouch)
        }

        // Attach skip listeners after a brief grace period (avoid accidental skip)
        setTimeout(() => {
          if (skipped) return
          skipHint.style.opacity = "1"
          document.addEventListener("keydown",    onKey)
          document.addEventListener("touchstart", onTouch)
          overlay.addEventListener("click",       onTouch)
        }, 400)

        // Render lines
        bootData.lines.forEach(({ text, color }, i) => {
          setTimeout(() => {
            if (skipped) return
            if (text === "") { linesEl.appendChild(document.createElement("br")); return }
            const line = document.createElement("div")
            line.className = `boot-line boot-line--${color}`
            line.textContent = text
            linesEl.appendChild(line)
            overlay.scrollTop = overlay.scrollHeight
          }, i * lineInterval)
        })

        // Typing prompt starts right after lines finish
        const promptDelay = lineCount * lineInterval + 100
        setTimeout(() => {
          if (skipped) return
          let i = 0
          const prompt = bootData.prompt
          promptEl.textContent = ""
          const cursor = document.createElement("span")
          cursor.className = "boot-cursor"
          cursor.textContent = "█"
          promptEl.appendChild(cursor)

          const type = () => {
            if (skipped) return
            if (i < prompt.length) {
              cursor.before(prompt[i])
              i++
              setTimeout(type, 25)   // was 45 ms — tighter
            } else {
              setTimeout(finishBoot, 200)  // was 400 ms
            }
          }
          type()
        }, promptDelay)
      }

      // ── Init ───────────────────────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", async () => {
        loadTheme()

        const lang = localStorage.getItem("lang") || "en"
        currentLang = lang
        document.documentElement.setAttribute("lang", lang)

        const data = await loadData(lang)
        if (!data) return
        render(data)

        const form  = document.getElementById("chat-form")
        const input = document.getElementById("chat-input")
        if (form && input) {
          form.addEventListener("submit", async e => {
            e.preventDefault()
            let q = input.value.trim()
            if (!q) return
            // Expand numeric shortcuts
            if (SHORTCUTS[q]) q = SHORTCUTS[q]
            input.value = ""
            await sendStreamingMessage(q)
          })
        }

        runBootSequence(data.boot)
      })
    </script>
  </body>
</html>
